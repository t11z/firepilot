version: "3.8"

services:
  demo-validate:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    command: bash ci/scripts/validate-all.sh
    environment:
      FIREPILOT_ENV: demo

  demo-orchestrator:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    command: >
      bash -c "python ci/scripts/process-issue.py --issue-body \"$(cat demo/example-issue.md)\""
    environment:
      FIREPILOT_ENV: demo
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
