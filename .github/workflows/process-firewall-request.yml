# FirePilot — Firewall Change Request Processing Workflow
#
# Required repository secrets:
#   ANTHROPIC_API_KEY  — Claude API authentication key
#
# The workflow also uses the built-in GITHUB_TOKEN (automatically provided
# by GitHub Actions) for all GitHub API operations: reading issue content,
# posting comments, updating labels, downloading attachments, creating
# branches, and opening pull requests.
# No additional token configuration is required for GITHUB_TOKEN.
#
# mcp-strata-cloud-manager and mcp-itsm are installed from the repository
# checkout and started as stdio subprocesses by the orchestrator script.
# No Docker images or external registry are required.
#
# ADR references:
#   ADR-0001 — Git as single source of truth: config enters via commit + CI
#   ADR-0003 — CI/CD pipeline: Gates 1–3 run on the PR produced here
#   ADR-0007 — YAML schema and directory layout used for committing files
#   ADR-0009 — GitHub Issues flow: issue opens, Claude processes, PR created
#   ADR-0010 — Eliminate comment-based approval gate: this workflow now
#               commits valid YAML directly and opens a PR
#   ADR-0015 — Claude writes config files via write_config_file MCP tool;
#               workflow scans OUTPUT_DIR instead of parsing Claude's text

name: Process Firewall Change Request

on:
  issues:
    types:
      - opened

jobs:
  process-request:
    name: Analyse firewall change request
    runs-on: ubuntu-latest
    # Only process issues that carry the firepilot:pending label
    if: contains(github.event.issue.labels.*.name, 'firepilot:pending')
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      REPO: ${{ github.repository }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Fetch full history so branch creation and push work correctly.
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 1a. Generate GitHub App token
      # -----------------------------------------------------------------------
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # -----------------------------------------------------------------------
      # 2. Python setup
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests anthropic PyYAML
          pip install ./mcp-servers/mcp-strata-cloud-manager
          pip install ./mcp-servers/mcp-itsm

      # -----------------------------------------------------------------------
      # 3. Process request and call Claude API
      # -----------------------------------------------------------------------
      # Claude writes YAML configuration files via the write_config_file MCP
      # tool into OUTPUT_DIR during its agentic loop (ADR-0015). The script
      # scans that directory to determine proposal_valid — no text parsing.
      #
      # The script writes GitHub Actions outputs:
      #   proposal_valid — "true" if Claude wrote .yaml files to OUTPUT_DIR
      #   rule_name      — derived from _rulebase.yaml or first rule file
      #   folder         — from _rulebase.yaml (default: shared)
      #   position       — from _rulebase.yaml (default: pre)
      #   from_zones     — comma-separated source zones
      #   to_zones       — comma-separated destination zones
      #   action         — rule action (allow/deny)
      #   services       — comma-separated services
      - name: Process request and call Claude API
        id: process
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
          FIREPILOT_ENV: demo
          OUTPUT_DIR: ${{ runner.temp }}/firepilot-extracted
          ITSM_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ITSM_GITHUB_REPO: ${{ github.repository }}
        run: |
          mkdir -p "${{ runner.temp }}/firepilot-extracted"
          python .github/scripts/process_firewall_request.py

      # -----------------------------------------------------------------------
      # 4. Compute the feature branch name
      # -----------------------------------------------------------------------
      # Only runs when process step produced a valid YAML proposal.
      - name: Compute feature branch name
        id: branch
        if: steps.process.outputs.proposal_valid == 'true'
        run: |
          RULE_NAME="${{ steps.process.outputs.rule_name }}"
          # Sanitise rule name for use in a branch name:
          #   • lowercase
          #   • replace any run of non-alphanumeric characters with a single hyphen
          #   • strip leading/trailing hyphens
          SANITISED=$(
            echo "$RULE_NAME" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9-]/-/g' \
              | sed 's/-\{2,\}/-/g' \
              | sed 's/^-//; s/-$//'
          )
          BRANCH="firepilot/issue-${ISSUE_NUMBER}-${SANITISED}"
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Computed branch name: ${BRANCH}"

      # -----------------------------------------------------------------------
      # 5. Idempotency check — skip if branch + PR already exist
      # -----------------------------------------------------------------------
      # Makes the workflow idempotent: if the issue is closed and reopened the
      # workflow detects the existing branch/PR and posts a link comment instead
      # of creating duplicates (ADR-0010, acceptance criterion 5).
      - name: Check for existing branch and PR
        id: idempotency
        if: steps.process.outputs.proposal_valid == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"

          # Check whether the branch already exists on the remote.
          if git ls-remote --heads origin "${BRANCH}" | grep -q .; then
            echo "Branch '${BRANCH}' already exists on remote."

            # Check for an open PR targeting main from this branch.
            PR_URL=$(
              gh pr list \
                --head "${BRANCH}" \
                --base main \
                --state open \
                --json url \
                --jq '.[0].url // ""'
            )

            if [ -n "${PR_URL}" ]; then
              echo "Open PR found: ${PR_URL}"
              echo "already_exists=true" >> "$GITHUB_OUTPUT"
              echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
            else
              # Branch exists but no open PR — proceed (e.g. PR was closed manually).
              echo "No open PR found for existing branch. Proceeding."
              echo "already_exists=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Branch '${BRANCH}' does not exist. Proceeding."
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Post a link comment and stop if the PR already exists.
      - name: Post existing PR link comment on issue
        if: steps.process.outputs.proposal_valid == 'true' && steps.idempotency.outputs.already_exists == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" --body "## FirePilot — Already Processed

          A pull request for this issue already exists:

          **PR**: ${{ steps.idempotency.outputs.pr_url }}

          _No duplicate branch or pull request was created._"

      # -----------------------------------------------------------------------
      # 6. Configure git identity
      # -----------------------------------------------------------------------
      - name: Configure git identity
        if: steps.process.outputs.proposal_valid == 'true' && steps.idempotency.outputs.already_exists != 'true'
        run: |
          git config user.name "FirePilot[bot]"
          git config user.email "firepilot[bot]@users.noreply.github.com"

      # -----------------------------------------------------------------------
      # 7. Create feature branch
      # -----------------------------------------------------------------------
      - name: Create feature branch
        if: steps.process.outputs.proposal_valid == 'true' && steps.idempotency.outputs.already_exists != 'true'
        run: |
          git checkout -b "${{ steps.branch.outputs.name }}"
          echo "Created branch: ${{ steps.branch.outputs.name }}"

      # -----------------------------------------------------------------------
      # 8. Copy configuration files to target directory
      # -----------------------------------------------------------------------
      # Claude wrote all .yaml files (rule files + _rulebase.yaml manifest)
      # via write_config_file into OUTPUT_DIR during its agentic loop (ADR-0015).
      # Copy them atomically to the target directory in the checkout.
      - name: Copy configuration files to target directory
        id: copy-files
        if: steps.process.outputs.proposal_valid == 'true' && steps.idempotency.outputs.already_exists != 'true'
        run: |
          FOLDER="${{ steps.process.outputs.folder }}"
          POSITION="${{ steps.process.outputs.position }}"
          TARGET_DIR="firewall-configs/${FOLDER}/${POSITION}"
          OUTPUT_DIR="${{ runner.temp }}/firepilot-extracted"

          mkdir -p "${TARGET_DIR}"
          cp "${OUTPUT_DIR}"/*.yaml "${TARGET_DIR}/"

          FILE_COUNT=$(ls "${OUTPUT_DIR}"/*.yaml | wc -l)
          echo "Copied ${FILE_COUNT} file(s) to ${TARGET_DIR}/"

          # Collect the list of copied filenames for downstream conditional.
          FILES=$(ls "${OUTPUT_DIR}"/*.yaml | xargs -n1 basename | tr '\n' ' ')
          echo "files=${FILES}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 9. Update _rulebase.yaml manifest (fallback if Claude did not write one)
      # -----------------------------------------------------------------------
      # ADR-0015: Claude takes ownership of manifest generation via
      # write_config_file. This step is a fallback for cases where Claude wrote
      # rule files but did not write a _rulebase.yaml manifest. Do NOT delete
      # update_rulebase_manifest.py — it may also be used by other operations.
      - name: Update _rulebase.yaml manifest (if not provided by Claude)
        if: >-
          steps.process.outputs.proposal_valid == 'true'
          && steps.idempotency.outputs.already_exists != 'true'
          && !contains(steps.copy-files.outputs.files, '_rulebase.yaml')
        run: |
          RULE_NAME="${{ steps.process.outputs.rule_name }}"
          FOLDER="${{ steps.process.outputs.folder }}"
          POSITION="${{ steps.process.outputs.position }}"
          MANIFEST="firewall-configs/${FOLDER}/${POSITION}/_rulebase.yaml"

          python .github/scripts/update_rulebase_manifest.py \
            --manifest "${MANIFEST}" \
            --rule-name "${RULE_NAME}" \
            --folder "${FOLDER}" \
            --position "${POSITION}"

      # -----------------------------------------------------------------------
      # 10. Commit all configuration files atomically
      # -----------------------------------------------------------------------
      # Stage all .yaml files in the target directory and commit them together.
      # A commit containing only a subset would fail Gate 1 (JSON Schema) and
      # Gate 2 (OPA) because the manifest↔file consistency invariant (ADR-0007)
      # would be violated.
      - name: Commit configuration files
        if: steps.process.outputs.proposal_valid == 'true' && steps.idempotency.outputs.already_exists != 'true'
        run: |
          FOLDER="${{ steps.process.outputs.folder }}"
          POSITION="${{ steps.process.outputs.position }}"

          git add "firewall-configs/${FOLDER}/${POSITION}/"
          git commit -m "feat(configs): add rules from issue #${ISSUE_NUMBER}"

      # -----------------------------------------------------------------------
      # 11. Push the feature branch
      # -----------------------------------------------------------------------
      - name: Push feature branch
        if: steps.process.outputs.proposal_valid == 'true' && steps.idempotency.outputs.already_exists != 'true'
        run: |
          git push -u origin "${{ steps.branch.outputs.name }}"

      # -----------------------------------------------------------------------
      # 12. Open a pull request against main
      # -----------------------------------------------------------------------
      # The PR body links back to the originating issue and lists all committed
      # configuration files. The `firewall-configs/**` path filter in
      # `validate.yml` ensures that Gates 1–3 run automatically on this PR
      # without any manual intervention.
      - name: Open pull request against main
        id: create-pr
        if: steps.process.outputs.proposal_valid == 'true' && steps.idempotency.outputs.already_exists != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          FOLDER="${{ steps.process.outputs.folder }}"
          POSITION="${{ steps.process.outputs.position }}"
          OUTPUT_DIR="${{ runner.temp }}/firepilot-extracted"

          # Build a Markdown list of all committed configuration files.
          FILE_LIST=$(ls "${OUTPUT_DIR}"/*.yaml | xargs -n1 basename | sed 's/^/- `/' | sed 's/$/`/')

          # Write the PR body to a temp file to avoid quoting/escaping issues.
          cat > /tmp/pr-body.md << BODY
          ## FirePilot — Automated Configuration PR

          **Originating issue**: #${ISSUE_NUMBER}
          **Branch**: \`${{ steps.branch.outputs.name }}\`

          ---

          ### Configuration files

          The following files were written by Claude via the \`write_config_file\` tool
          and committed to \`firewall-configs/${FOLDER}/${POSITION}/\`:

          ${FILE_LIST}

          ---

          ### Validation

          The CI pipeline (\`validate.yml\`) triggers automatically on this PR due to
          the \`firewall-configs/**\` path filter. All three gates must pass before
          the PR can be merged:

          - **Gate 1** — JSON Schema validation (structural correctness)
          - **Gate 2** — OPA policy evaluation (security semantics)
          - **Gate 3** — SCM dry-run validation

          After merge, \`deploy.yml\` re-runs Gates 1–3 then executes **Gate 4**:
          pushing the configuration to Strata Cloud Manager via
          \`mcp-strata-cloud-manager\` and recording the result via \`mcp-itsm\`.

          ---

          _This PR was auto-generated by the FirePilot processing workflow in response
          to issue #${ISSUE_NUMBER}.  Human review and PR approval are required before
          merging._
          BODY

          PR_URL=$(
            gh pr create \
              --title "[FirePilot] Issue #${ISSUE_NUMBER} — ${{ steps.process.outputs.rule_name }}" \
              --body-file /tmp/pr-body.md \
              --base main \
              --head "${{ steps.branch.outputs.name }}"
          )

          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "Pull request created: ${PR_URL}"

      # -----------------------------------------------------------------------
      # 13. Post a comment on the issue linking to the newly created PR
      # -----------------------------------------------------------------------
      - name: Post PR link comment on issue
        if: steps.process.outputs.proposal_valid == 'true' && steps.idempotency.outputs.already_exists != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          RULE_NAME="${{ steps.process.outputs.rule_name }}"
          PR_URL="${{ steps.create-pr.outputs.pr_url }}"

          gh issue comment "${ISSUE_NUMBER}" --body "## FirePilot — Pull Request Created

          The proposed configuration has been committed and a pull request has been opened automatically.

          **PR**: ${PR_URL}

          **Next steps**:
          1. The CI validation pipeline (Gates 1–3) is running on the PR now.
          2. Review the validation results and the configuration diff in the PR.
          3. Merge the PR to trigger Gate 4 — deployment to Strata Cloud Manager.

          _Rule_: \`${RULE_NAME}\`"
