name: Deploy Firewall Configuration

on:
  push:
    branches:
      - main
    paths:
      - "firewall-configs/**"
      - "ci/**"

jobs:
  validate:
    name: Re-validate before deployment (defense-in-depth)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: pip install check-jsonschema pyyaml

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Run OPA policy tests
        run: opa test ci/policies/ -v

      - name: Run validation gates (1–3)
        run: bash ci/scripts/validate-all.sh
        env:
          FIREPILOT_ENV: demo

  deploy:
    name: Deploy to firewall (Gate 4)
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MCP servers
        run: |
          pip install pyyaml
          pip install ./mcp-servers/mcp-strata-cloud-manager
          pip install ./mcp-servers/mcp-itsm

      - name: Extract ticket ID from branch name
        id: ticket
        run: |
          # Branch naming convention: firepilot/issue-{N}-{rule-name}
          # Extract issue number from the PR branch that was merged into main.
          BRANCH="${{ github.event.head_commit.message }}"
          # Try to extract from merge commit message "Merge pull request ... from .../firepilot/issue-N-..."
          TICKET_ID=$(echo "$BRANCH" | grep -oP 'firepilot/issue-\K[0-9]+' | head -1 || true)

          if [ -z "$TICKET_ID" ]; then
            # Fallback: check TICKET_ID env var or leave empty (demo mode will still work)
            TICKET_ID="${TICKET_ID_OVERRIDE:-}"
          fi

          echo "ticket_id=${TICKET_ID}" >> "$GITHUB_OUTPUT"

      - name: Run deployment (Gate 4)
        run: bash ci/scripts/gate4-deploy.sh
        env:
          FIREPILOT_ENV: ${{ vars.FIREPILOT_ENV || 'demo' }}
          TICKET_ID: ${{ steps.ticket.outputs.ticket_id }}
          # SCM credentials — injected from repository secrets in live mode (ADR-0006)
          SCM_CLIENT_ID: ${{ secrets.SCM_CLIENT_ID }}
          SCM_CLIENT_SECRET: ${{ secrets.SCM_CLIENT_SECRET }}
          SCM_TSG_ID: ${{ secrets.SCM_TSG_ID }}
          # ITSM credentials — App token generated at runtime (ADR-0006)
          ITSM_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ITSM_GITHUB_REPO: ${{ github.repository }}

      - name: Tag successful deployment
        if: success()
        run: |
          DEPLOY_TAG="deploy-$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA::8}"
          git tag "$DEPLOY_TAG"
          git push origin "$DEPLOY_TAG"

      - name: Remove pending label from originating issue
        if: success() && steps.ticket.outputs.ticket_id != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TICKET_ID="${{ steps.ticket.outputs.ticket_id }}"
          if [ -n "$TICKET_ID" ]; then
            echo "Removing firepilot:pending label from issue #${TICKET_ID}"
            gh issue edit "$TICKET_ID" \
              --repo "${{ github.repository }}" \
              --remove-label "firepilot:pending" \
              2>/dev/null || echo "Label already removed or not present"
          fi
