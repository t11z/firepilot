# firepilot.yaml for overly-permissive-internet fixture.
# Used with --zones to activate topology policies for this OPA test.

schema_version: 1
scm:
  default_folder: "Shared"
  default_position: "pre"
rule_defaults:
  tag: "firepilot-managed"
  log_end: true
  log_start: false
zones:
  untrust:
    role: internet
    description: "External internet-facing zone"
  dmz:
    role: dmz
    description: "Demilitarized zone for public-facing services"
