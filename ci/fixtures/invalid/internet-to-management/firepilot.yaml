# firepilot.yaml for internet-to-management fixture.
# Used with --config to activate topology policies for this OPA test.

schema_version: 1
scm:
  default_folder: "Shared"
  default_position: "pre"
rule_defaults:
  tag: "firepilot-managed"
  log_end: true
  log_start: false
zones:
  untrust:
    role: internet
    description: "External internet-facing zone"
  mgmt:
    role: management
    description: "Out-of-band management network"
