# INVALID: firepilot.yaml with a zone entry missing the required description field.
#
# Expected failure: JSON Schema required property validation (Gate 1)
# Violation: the "untrust" zone entry omits the required "description" field.
#   Every zone entry must have both "role" and "description" (ADR-0008 Field Reference).

schema_version: 1
scm:
  default_folder: "Shared"
  default_position: "pre"
rule_defaults:
  tag: "firepilot-managed"
  log_end: true
  log_start: false
zones:
  untrust:
    # INVALID: "description" is required but absent
    role: internet
  trust:
    role: internal
    description: "Internal trusted corporate network"
